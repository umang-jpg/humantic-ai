steps:
  # ==========================================
  # BACKEND BUILD & DEPLOYMENT
  # ==========================================
  # 1. Build the backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/humantic-backend', './backend']
    id: 'build-backend'

  # 2. Push the backend Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/humantic-backend']
    id: 'push-backend'

  # 3. Deploy the backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'humantic-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/humantic-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      # You might want to inject environment variables here:
      # - '--set-env-vars'
      # - 'DB_HOST=...,DB_USER=...'
    id: 'deploy-backend'

  # ==========================================
  # FRONTEND BUILD & DEPLOYMENT
  # ==========================================
  # 4. Build the frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/humantic-frontend', './frontend']
    id: 'build-frontend'

  # 5. Push the frontend Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/humantic-frontend']
    id: 'push-frontend'

  # 6. Deploy the frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'humantic-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/humantic-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '5173'
      # Set the backend URL for the frontend
      # - '--set-env-vars'
      # - 'VITE_API_URL=https://humantic-backend-xyz.run.app'
    id: 'deploy-frontend'

images:
  - 'gcr.io/$PROJECT_ID/humantic-backend'
  - 'gcr.io/$PROJECT_ID/humantic-frontend'

# NOTE: The Celery workers (celery_worker, celery_beat) are not deployed here.
# Cloud Run is designed for HTTP request-driven workloads. To run Celery workers on GCP,
# you typically deploy them to a Compute Engine instance, GKE, or Cloud Run (if you configure
# an HTTP listener to satisfy Cloud Run's port requirement and enable "always-on CPU").

options:
  logging: CLOUD_LOGGING_ONLY
